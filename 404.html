<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — ChatyInput</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root {
            --ink: #0a0a0a;
            --ink-2: #3a3a3a;
            --ink-3: #777;
            --bg: #fafaf9;
            --accent: #e85d25;
            --border: #e4e3e0;
            --font: 'General Sans', -apple-system, system-ui, sans-serif;
        }
        html { -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font); color: var(--ink); background: var(--bg); line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }

        /* Nav */
        nav {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
        }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .nav-left { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
        .nav-mark { width: 28px; height: 28px; }
        .nav-mark img { width: 100%; height: 100%; object-fit: contain; }
        .nav-wordmark { font-weight: 700; font-size: 15px; letter-spacing: -0.03em; }
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .nav-right a { font-size: 14px; font-weight: 500; color: var(--ink-2); text-decoration: none; }
        .nav-right a:hover { color: var(--accent); }

        /* 404 content */
        .error-page {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 24px; text-align: center;
        }
        .error-code {
            font-size: clamp(80px, 15vw, 160px);
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
            color: var(--accent);
            opacity: 0.15;
        }
        .error-title {
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-top: -20px;
        }
        .error-desc {
            font-size: 16px;
            color: var(--ink-2);
            margin-top: 12px;
            max-width: 400px;
        }
        .error-actions {
            display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 10px;
            font-family: var(--font); font-size: 15px; font-weight: 600;
            text-decoration: none; transition: all .15s;
        }
        .btn-dark { background: var(--ink); color: #fff; }
        .btn-dark:hover { background: #222; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
        .btn-ghost:hover { border-color: #bbb; transform: translateY(-1px); }

        /* Footer */
        footer {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
        }
        .footer-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .footer-left { font-size: 13px; color: var(--ink-3); }
        .footer-left a { color: var(--ink-2); text-decoration: none; }
        .footer-left a:hover { color: var(--ink); }
        .footer-right { display: flex; gap: 20px; }
        .footer-right a { font-size: 13px; color: var(--ink-3); text-decoration: none; }
        .footer-right a:hover { color: var(--ink); }

        @media (max-width: 640px) {
            nav { padding: 12px 16px; }
            .nav-right a:first-child { display: none; }
            .error-page { padding: 40px 16px; }
            footer { padding: 16px; }
            .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="/" class="nav-left">
            <div class="nav-mark"><img src="logo.png" alt="ChatyInput"></div>
            <span class="nav-wordmark">ChatyInput</span>
        </a>
        <div class="nav-right">
            <a href="https://www.thinkroid.com" target="_blank">Thinkroid</a>
            <a href="/">Home</a>
        </div>
    </div>
</nav>

<main class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Maybe try speaking to us instead?</p>
    <div class="error-actions">
        <a href="/" class="btn btn-dark">Back to Home</a>
        <a href="https://github.com/ChatyInput-org" class="btn btn-ghost" target="_blank">View on GitHub</a>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <div class="footer-left">&copy; 2026 <a href="https://thinkroid.com">Thinkroid</a> &middot; Built in Vancouver</div>
        <div class="footer-right">
            <a href="https://github.com/ChatyInput-org" target="_blank">GitHub</a>
        </div>
    </div>
</footer>

</body>
</html>
